<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Perceptron L vs T</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
  <script type="py-config">
[[fetch]]
files = ["https://prolightpower.github.io/webPerceptron/perceptron.py", "https://prolightpower.github.io/webPerceptron/dataset.json"]
  </script>
</head>
<body>
  <div class="container">
    <h1>Perceptron: L vs T Classifier</h1>
    <p class="subtitle">
      Enter 9 values (0 or 1) for a flattened 3x3 pixel grid, comma-separated.
    </p>

    <div class="grid-preview" id="gridPreview"></div>

    <div class="input-row">
      <input id="inputBox" type="text" placeholder="e.g. 1,0,0,1,0,0,1,1,1">
      <button id="classifyBtn" disabled>Loading...</button>
    </div>

    <p id="output" class="output"></p>
  </div>

  <script type="py">
import json
from js import document
from perceptron import Perceptron, classify

# Load dataset (fetched via py-config above)
import js
async def setup():
    resp = await js.fetch("https://prolightpower.github.io/webPerceptron/dataset.json")
    text = await resp.text()
    data = json.loads(text)

    n_inputs = len(data[0]["input"])
    p = Perceptron(n_inputs)
    p.train(data, epochs=100)

    def render_grid(values):
        preview = document.getElementById("gridPreview")
        preview.innerHTML = ""
        for val in values:
            cell = document.createElement("div")
            cell.className = "cell on" if val == 1 else "cell off"
            preview.appendChild(cell)

    def on_click(evt):
        raw = document.getElementById("inputBox").value.strip()
        output_el = document.getElementById("output")

        if not raw:
            output_el.innerHTML = "Please enter some values."
            output_el.className = "output warn"
            return

        try:
            input_list = [int(x.strip()) for x in raw.split(",")]
        except ValueError:
            output_el.innerHTML = "Only use 0s and 1s, comma-separated."
            output_el.className = "output warn"
            return

        if len(input_list) != 9:
            output_el.innerHTML = f"Expected 9 values, got {len(input_list)}."
            output_el.className = "output warn"
            return

        render_grid(input_list)
        result = classify(p, input_list)
        label = "L shape detected" if result == "L" else "T shape detected"
        output_el.innerHTML = f"Prediction: <strong>{result}</strong> - {label}"
        output_el.className = "output result"

    btn = document.getElementById("classifyBtn")
    btn.disabled = False
    btn.innerText = "Classify"
    btn.addEventListener("click", on_click)

import asyncio
asyncio.ensure_future(setup())
  </script>
</body>
</html>
