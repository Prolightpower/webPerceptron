<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Perceptron L vs T</title>
  <link rel="stylesheet" href="style.css">

  <!-- Pinned PyScript version (latest is broken) -->
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

  <!-- Declare local Python file so PyScript can import it -->
  <script type="py-config">
    [[fetch]]
    files = ["./perceptron.py", "./dataset.json"]
  </script>
</head>
<body>
  <div class="container">
    <h1>Perceptron: L vs T Classifier</h1>
    <p class="subtitle">
      Enter 9 values (0 or 1) for a flattened 3×3 pixel grid, comma-separated.
    </p>

    <div class="grid-preview" id="gridPreview"></div>

    <div class="input-row">
      <input id="inputBox" type="text" placeholder="e.g. 1,0,0,1,0,0,1,1,1">
      <button id="classifyBtn" disabled>Loading…</button>
    </div>

    <p id="output" class="output"></p>
  </div>

  <script type="py">
from perceptron import classify
from js import document

def render_grid(values):
    preview = document.getElementById("gridPreview")
    preview.innerHTML = ""
    for val in values:
        cell = document.createElement("div")
        cell.className = "cell on" if val == 1 else "cell off"
        preview.appendChild(cell)

def on_click(evt):
    raw = document.getElementById("inputBox").value.strip()
    output_el = document.getElementById("output")

    if not raw:
        output_el.innerHTML = "⚠️ Please enter some values."
        output_el.className = "output warn"
        return

    try:
        input_list = [int(x.strip()) for x in raw.split(",")]
    except ValueError:
        output_el.innerHTML = "⚠️ Only use 0s and 1s, comma-separated."
        output_el.className = "output warn"
        return

    if len(input_list) != 9:
        output_el.innerHTML = f"⚠️ Expected 9 values, got {len(input_list)}."
        output_el.className = "output warn"
        return

    render_grid(input_list)
    result = classify(input_list)
    label = "L shape detected" if result == "L" else "T shape detected"
    output_el.innerHTML = f"Prediction: <strong>{result}</strong> — {label}"
    output_el.className = "output result"

btn = document.getElementById("classifyBtn")
btn.disabled = False
btn.innerText = "Classify"
btn.addEventListener("click", on_click)
  </script>
</body>
</html>
